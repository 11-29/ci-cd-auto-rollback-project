name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: 32.193.4.42
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ci-cd-project
            git pull
            docker stop my-app || true
            docker rm my-app || true
            docker build -t my-app .
            docker run -d -p 5000:5000 --name my-app my-app
